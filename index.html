<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Guessing Game</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffc9df;
padding:20px;
}

.game-box{
width:100%;
max-width:500px;
background:white;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
color:#ff4f9a;
margin-bottom:15px;
}

.top-bar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:22px;
font-weight:bold;
color:#ff4f9a;
}

.emoji{
font-size:75px;
margin:20px 0;
}

.question{
font-size:20px;
color:#666;
margin-bottom:15px;
}

.choice{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:15px;
background:#ffd9ea;
color:#444;
font-size:18px;
cursor:pointer;
transition:.2s;
}

.choice:hover{
transform:scale(1.03);
}

.feedback{
height:35px;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

.correct{ color:#2fbf71; }
.wrong{ color:#ff4f6d; }

.screen{
display:none;
}

.screen h2{
color:#ff4f9a;
margin-bottom:15px;
}

.play-btn{
padding:12px 25px;
border:none;
border-radius:15px;
background:#ff5ca8;
color:white;
font-size:18px;
cursor:pointer;
margin-top:15px;
}
</style>
</head>

<body>

<div class="game-box">

<div id="game">

<h1>🎀 Emoji Guessing Game 🎀</h1>

<div class="top-bar">
<div>⭐ Score: <span id="score">0</span></div>
<div>⏳ <span id="timer">40</span></div>
</div>

<div class="emoji" id="emoji"></div>

<div class="question">Guess the movie</div>

<div id="choices"></div>

<div class="feedback" id="feedback"></div>

</div>

<!-- WIN SCREEN -->
<div class="screen" id="winScreen">
<h2>🏆 You Win! 🏆</h2>
<p>Your Score: <span id="finalScore"></span></p>
<button class="play-btn" onclick="restartGame()">Play Again</button>
</div>

<!-- GAME OVER SCREEN -->
<div class="screen" id="loseScreen">
<h2>💔 Game Over</h2>
<p>Your Score: <span id="finalScore2"></span></p>
<button class="play-btn" onclick="restartGame()">Play Again</button>
</div>

</div>

<audio id="correctSound">
<source src="mixkit-correct-answer-tone-2870.wav" type="audio/wav">
</audio>

<audio id="wrongSound">
<source src="mixkit-wrong-answer-fail-notification-946.wav" type="audio/wav">
</audio>

<audio id="gameOverSound">
<source src="mixkit-musical-game-over-959.wav" type="audio/wav">
</audio>

<audio id="winSound">
<source src="mixkit-animated-small-group-applause-523.wav" type="audio/wav">
</audio>

<script>

const questions=[
{emoji:"👑🦁", answer:"Lion King", choices:["Lion King","Madagascar","Tarzan","Kung Fu Panda"]},
{emoji:"🕷️👨", answer:"Spider-Man", choices:["Batman","Spider-Man","Iron Man","Superman"]},
{emoji:"❄️👭", answer:"Frozen", choices:["Moana","Frozen","Brave","Tangled"]},
{emoji:"🐼🥋", answer:"Kung Fu Panda", choices:["Mulan","Karate Kid","Kung Fu Panda","Panda Express"]},
{emoji:"🚢🧊💔", answer:"Titanic", choices:["Avatar","Titanic","Jaws","Moana"]},
{emoji:"🐠🔍", answer:"Finding Nemo", choices:["Luca","Finding Nemo","Dory","Shark Tale"]},
{emoji:"🦖🏞️", answer:"Jurassic Park", choices:["Ice Age","Tarzan","Jurassic Park","Madagascar"]},
{emoji:"👠👸", answer:"Cinderella", choices:["Snow White","Cinderella","Elsa","Belle"]},
{emoji:"🧛‍♂️🩸", answer:"Dracula", choices:["Twilight","Underworld","Blade","Dracula"]},
{emoji:"⚙️👨‍🎓👨‍🎓👨‍🎓", answer:"3 Idiots", choices:["The Hangover","The Three Stooges","3 Idiots","Superbad"]},
{emoji:"🐭👨‍🍳", answer:"Ratatouille", choices:["Mickey Mouse Clubhouse","Ratatouille","Stuart Little","Cloudy with a Chance of Meatballs"]},
{emoji:"🌹🦁", answer:"Beauty and the Beast", choices:["Snow White","Beauty and the Beast","Rapunzel","The Lion King"]},
{emoji:"🎸💀", answer:"Coco", choices:["Sing","Encanto","La La Land","Coco"]},
{emoji:"🛡️🇺🇸", answer:"Captain America", choices:["Superman","Captain America","Iron Man","Aquaman"]},
{emoji:"🌊⛵", answer:"Moana", choices:["Lilo & Stitch","Peter Pan","Moana","Atlantis: The Lost Empire"]},
{emoji:"😡🐦", answer:"Angry Birds", choices:["Rio","Madagascar","Angry Birds","Zootopia"]},
{emoji:"🦁🦓🦒🦛", answer:"Madagascar", choices:["The Lion King","Madagascar","Ice Age","Kung Fu Panda"]},
{emoji:"🎭🔪📞", answer:"Scream", choices:["Halloween","Annabelle","Scream","Friday The 13th"]},
{emoji:"✈️💀😱🔮", answer:"Final Destination", choices:["The Ring","Wrong Turn","Final Destination","A Quiet Place"]},
{emoji:"🧛‍♂️🐺🌲❤️", answer:"Twilight", choices:["Underworld","Interview with the he Vampire","Van Helsing","Twilight"]}
];

let current=0;
let score=0;
let timeLeft=40;
let timer;

function startTimer(){

clearInterval(timer);

timer=setInterval(()=>{

timeLeft--;
document.getElementById("timer").textContent=timeLeft;

if(timeLeft<=0){
showLose();
}

},1000);

}

function loadQuestion(){

const q=questions[current];

document.getElementById("emoji").textContent=q.emoji;

const choices=document.getElementById("choices");
choices.innerHTML="";

document.getElementById("feedback").textContent="";

q.choices.sort(()=>Math.random()-0.5);

q.choices.forEach(choice=>{

const btn=document.createElement("button");
btn.className="choice";
btn.textContent=choice;

btn.onclick=()=>checkAnswer(choice);

choices.appendChild(btn);

});

}

function checkAnswer(choice){

const q=questions[current];

if(choice===q.answer){

score+=10;
document.getElementById("score").textContent=score;

document.getElementById("correctSound").currentTime=0;
document.getElementById("correctSound").play();

document.getElementById("feedback").textContent="✨ Correct!";
document.getElementById("feedback").className="feedback correct";

setTimeout(()=>{

current++;

if(current>=questions.length){
showWin();
}else{
loadQuestion();
}

},600);

}else{

document.getElementById("wrongSound").currentTime=0;
document.getElementById("wrongSound").play();

showLose(false);

}

}

function showWin(){

document.getElementById("winSound").currentTime=0;
document.getElementById("winSound").play();

clearInterval(timer);

document.getElementById("game").style.display="none";
document.getElementById("winScreen").style.display="block";
document.getElementById("loseScreen").style.display="none";

document.getElementById("finalScore").textContent=score;

}

function showLose(playGameOverSound=true){

if(playGameOverSound){
document.getElementById("gameOverSound").currentTime=0;
document.getElementById("gameOverSound").play();
}

clearInterval(timer);

document.getElementById("game").style.display="none";
document.getElementById("winScreen").style.display="none";
document.getElementById("loseScreen").style.display="block";

document.getElementById("finalScore2").textContent=score;

}

function restartGame(){

current=0;
score=0;
timeLeft=40;

document.getElementById("score").textContent=0;
document.getElementById("timer").textContent=40;

document.getElementById("winScreen").style.display="none";
document.getElementById("loseScreen").style.display="none";
document.getElementById("game").style.display="block";

loadQuestion();
startTimer();

}

loadQuestion();
startTimer();

</script>

</body>
</html>
